# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: cmdexec
report_sizes: true
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
builds:
  - skip: true
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  use: git
release:
  gitea:
    owner: jaredallard
    name: cmdexec

  prerelease: "auto"
  footer: |-
    **Full Changelog**: https://git.rgst.io/jaredallard/cmdexec/compare/{{ .PreviousTag }}...{{ .Tag }}

gitea_urls:
  api: https://git.rgst.io/api/v1
  download: https://git.rgst.io

## <<Stencil::Block(extraReleaseOpts)>>

## <</Stencil::Block>>
